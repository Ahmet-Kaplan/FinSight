target_name: Global Semiconductor Industry
stock_code: ''
target_type: industry
target_profiles:
- industry
- macro
market: ''
output_dir: ./outputs/global-semiconductor-industry
language: en
reference_doc_path: src/template/report_template.docx
custom_collect_tasks:
- Global semiconductor market size, revenue, and shipment data for the last 5-10 years
  with 3-year forward forecasts
- Supply chain data including wafer fabrication, assembly, testing, and packaging
  capacity by region and company
- 'Demand layer breakdown by end-market: datacenter, smartphone, PC, automotive, industrial,
  consumer electronics'
- Company structure and market share data for key players across the semiconductor
  value chain
- Macroeconomic indicators (GDP growth, interest rates, inflation) and their historical
  correlation with semiconductor cycles
- Financial statements, analyst estimates, and valuation metrics for ASML Holding
  NV and Taiwan Semiconductor Manufacturing Company (TSMC)
- Management commentary, strategic direction, and capital allocation plans from ASML
  and TSMC earnings calls and presentations
- Technology roadmap data for advanced nodes (3nm, 2nm, 1.4nm) and EUV/High-NA lithography
  adoption timelines
- Geopolitical and trade policy data affecting semiconductor supply chains (export
  controls, CHIPS Act, subsidies)
- Inventory levels and utilization rates across the semiconductor supply chain
- Raw material and equipment cost trends for semiconductor manufacturing
- Competitive landscape analysis including Intel, Samsung, and other foundry/logic/memory
  players
custom_analysis_tasks:
- Analyze the structural growth drivers versus cyclical components in the semiconductor
  industry over the next 3 years
- Evaluate supply-demand balance across the semiconductor value chain and identify
  potential bottlenecks or oversupply risks
- Assess how global macroeconomic outlook (growth, rates, geopolitics) will impact
  semiconductor demand and pricing
- Compare company structures and business models across the semiconductor ecosystem
  (fabless, IDM, foundry, equipment)
- Analyze ASML's competitive positioning, technology leadership in lithography, and
  management execution capabilities
- Evaluate TSMC's foundry dominance, advanced node roadmap execution, and management's
  capital allocation strategy
- Develop integrated 3-year scenarios (base, bull, bear) combining macro forecasts
  with industry supply-demand dynamics
- Project how ASML and TSMC might perform relative to industry averages based on their
  strategic directions
- Compare personal evaluation of market/industry outlook with consensus analyst views
  and management guidance
- Assess valuation sensitivity of semiconductor companies to changes in macro conditions
  and industry cycles
- Identify key investment risks and catalysts specific to semiconductor companies
  over the 3-year horizon
- Provide conclusions on whether ASML and TSMC are positioned to outperform or underperform
  the broader semiconductor market
rate_limits:
  search_engines: 1.0
  financial_apis: 0.5
  fred_api: 0.5
  yfinance: 0.2
llm_config_list:
- model_name: ${DS_MODEL_NAME}
  api_key: ${DS_API_KEY}
  base_url: ${DS_BASE_URL}
  generation_params:
    temperature: 0.7
    max_tokens: 8192
    top_p: 0.95
- model_name: ${EMBEDDING_MODEL_NAME}
  api_key: ${EMBEDDING_API_KEY}
  base_url: ${EMBEDDING_BASE_URL}
- model_name: ${VLM_MODEL_NAME}
  api_key: ${VLM_API_KEY}
  base_url: ${VLM_BASE_URL}
use_collect_data_cache: true
use_analysis_cache: true
use_report_outline_cache: true
use_full_report_cache: true
use_post_process_cache: true

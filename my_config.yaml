target_name: "ASML Holding N.V."
stock_code: "ASML"
target_type: "financial_company" # or macro, industry, general
output_dir: "./outputs/asml-company"
language: "en"
reference_doc_path: "src/template/report_template.docx"
outline_template_path: "src/template/company_outline_en.md"

custom_collect_tasks:
  - "Historical balance sheet, income statement, and cash flow statement for the last 5-10 fiscal years"
  - "Basic stock information, market capitalisation, share price history, trading volume, and valuation multiples"
  - "Shareholder structure, institutional ownership, and major insider holdings"
  - "Analyst ratings, target prices, and consensus estimates"
  - "Key valuation metrics including P/E, EV/EBITDA, P/S, P/B, ROE, ROIC, gross margin, operating margin, and free cash flow margin"
  - "Revenue breakdown by business segment, geography, installed base management, and service-related revenue"
  - "Key customer concentration and major end-market exposure including logic and memory"
  - "Competitor landscape including Nikon, Canon, Applied Materials, Lam Research, KLA, and other semiconductor equipment companies"
  - "Relevant industry and benchmark index data including Nasdaq, SOX index, Euro Stoxx, S&P 500, and major semiconductor capital expenditure trends"
  - "Recent company filings, annual reports, investor presentations, earnings call transcripts, and capital allocation disclosures"

custom_analysis_tasks:
  - "Summarise ASML's development history, major milestones, and current core business model, with emphasis on lithography leadership and EUV/High-NA technology"
  - "Analyse management background, governance structure, and capital allocation philosophy"
  - "Examine ownership structure, major shareholders, and any meaningful changes in institutional positioning"
  - "Analyse historical revenue growth, order backlog, gross margin, operating leverage, and segment mix over the last 5-10 years"
  - "Evaluate profitability using ROE, ROIC, gross margin, operating margin, net margin, and free cash flow conversion"
  - "Assess balance sheet quality, liquidity, debt profile, working capital efficiency, and cash flow resilience"
  - "Analyse ASML's competitive moat, including technological leadership, ecosystem lock-in, switching costs, customer dependence, supply chain constraints, and regulatory/export-control risks"
  - "Compare ASML against key semiconductor equipment peers on valuation, profitability, growth, R&D intensity, and strategic positioning"
  - "Review the stock's performance over the last 5 years and explain the impact of major events such as semiconductor cycles, export controls, AI demand, customer capex shifts, and earnings revisions"
  - "Develop a forward-looking view for the next 2 years on revenue, margins, EPS, free cash flow, and valuation under base, bull, and bear scenarios"
  - "Identify the most important investment risks and catalysts, including cyclicality, customer concentration, China exposure, geopolitical risk, and technology execution"
  - "Conclude with an investment thesis that clearly states whether ASML appears undervalued, fairly valued, or overvalued relative to fundamentals and peers"

use_collect_data_cache: True
use_analysis_cache: True
use_report_outline_cache: True
use_full_report_cache: True
use_post_process_cache: True

llm_config_list:
  - model_name: "${DS_MODEL_NAME}"
    api_key: "${DS_API_KEY}"
    base_url: "${DS_BASE_URL}"
    generation_params:
      temperature: 0.7
      max_tokens: 8192
      top_p: 0.95
  - model_name: "${EMBEDDING_MODEL_NAME}"
    api_key: "${EMBEDDING_API_KEY}"
    base_url: "${EMBEDDING_BASE_URL}"
  - model_name: "${VLM_MODEL_NAME}"
    api_key: "${VLM_API_KEY}"
    base_url: "${VLM_BASE_URL}"